# Site settings
title: "幸運日記 ✨"
description: "暖心可愛的手寫風格日記，紀錄生活中的小確幸 🐾"
baseurl: "/ai-lucky" # the subpath of your site, e.g. /blog
timezone: Asia/Taipei
future: true

# Build settings
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
  - README.md
  - implementation_plan.md

plugins:
  - jekyll-seo-tag
  - jekyll-feed
